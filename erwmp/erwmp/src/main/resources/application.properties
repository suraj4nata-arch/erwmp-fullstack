spring.application.name=erwmp
server.port=9000

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

spring.data.redis.host=localhost
#spring.data.redis.host=redis
spring.data.redis.port=6379
spring.cache.type=redis

# ===============================
# Database Configuration
# ===============================

## The below changes is when you run a docker containers
#spring.datasource.url=jdbc:mysql://host.docker.internal:3306/erwmp_db
spring.datasource.url=jdbc:mysql://localhost:3306/erwmp_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ===============================
# KAFKA
# ===============================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=group1
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

jwt.secret=mysupersecurejwtsecretkeywithatleast32characters!!
jwt.expiration-ms=3600000

# 1 hour

logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.com.company.erwmp=DEBUG


#? Secret = master key to sign ID cards
#? Expiration = card validity

file.upload-dir=C:/Artifacts
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB





