spring.application.name=erwmp
server.port=9000

# ===============================
# Database Configuration
# ===============================

## The below changes is when you run a docker containers
#spring.datasource.url=jdbc:mysql://host.docker.internal:3306/erwmp_db
spring.datasource.url=jdbc:mysql://localhost:3306/erwmp_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

jwt.secret=mysupersecurejwtsecretkeywithatleast32characters!!
jwt.expiration-ms=3600000

# 1 hour

logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.com.company.erwmp=DEBUG


#? Secret = master key to sign ID cards
#? Expiration = card validity

file.upload-dir=C:/Java_Project/upload_files
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB





